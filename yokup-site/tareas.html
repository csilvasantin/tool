<!DOCTYPE html>
<html lang="es">
<head>

<link rel="apple-touch-icon" href="/app/apple-touch-icon.png">

<style>
:root{--bg:#02080d;--card:#0a1620;--card2:#0d1c28;--ink:#dff8ff;--mut:#75aab9;--dim:#4d7a88;--brand:#78f3ff;--accent:#ffd866;--good:#88ffaa;--warn:#ff8866;--violet:#aa88ff;--line:rgba(120,243,255,.16);--line2:rgba(120,243,255,.30);--sans:var(--admira-font-sans,-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif);--mono:var(--admira-font-mono,ui-monospace,SFMono-Regular,"JetBrains Mono",Menlo,monospace)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:22px 24px 48px}
h1{font-size:clamp(23px,3vw,31px);letter-spacing:-.02em;margin:4px 0 4px}
.sub{color:var(--mut);font-size:14.5px;margin-bottom:14px}.sub b{color:var(--brand)}
/* Filtro por FECHA de creación de la misión (por defecto: hoy). */
.tfilter{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.tf{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:8px 13px;border-radius:9px;border:1px solid var(--line);color:var(--mut);background:var(--card);cursor:pointer;transition:.2s}
.tf:hover{color:var(--brand);border-color:var(--line2)}
.tf.on{color:#02080d;background:var(--brand);border-color:var(--brand)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(320px,100%),1fr));gap:14px;align-items:start}
.mcard{border:1px solid var(--line);border-radius:14px;background:var(--card);padding:16px 17px}
.mcard .mhd{display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-family:var(--mono);margin-bottom:6px}
.mcard .mid{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--brand);text-decoration:none}.mcard .mid:hover{text-decoration:underline}
.mcard .tcount{font-size:10px;color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:3px 8px;margin-left:auto;white-space:nowrap}
.mcard .msub{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}
.mcard .mmeta{font-family:var(--mono);font-size:10.5px;color:var(--mut);margin-bottom:10px}.mcard .mmeta .scr{color:var(--brand)}
.mcard .tree{border-top:1px solid var(--line);padding-top:10px}
.mcard .mhd{cursor:pointer}
.mcard .mtog{flex:none;border:none;background:transparent;color:var(--mut);font-size:12px;cursor:pointer;padding:0 2px;line-height:1}
.mcard.collapsed .tree,.mcard.collapsed .mmeta{display:none}
.mcard.collapsed{padding-bottom:13px;opacity:.92}
.mcard.collapsed .msub{margin-bottom:0}
/* VISTA LISTA (conmutador del cabezal, 962): las fichas altas pasan a filas
   compactas de una columna (cabecera + título, sin el árbol). Cero scroll horizontal:
   sigue siendo una columna fluida, no una tabla desbordada. */
html[data-yk-view="list"] .grid{grid-template-columns:1fr}
html[data-yk-view="list"] .mcard .tree,html[data-yk-view="list"] .mcard .mmeta{display:none}
html[data-yk-view="list"] .mcard{padding:11px 15px}
html[data-yk-view="list"] .mcard .mtog{display:none}
/* Foco de una misión (964): breadcrumb de vuelta a la lista completa. */
.focobar{grid-column:1/-1;display:flex;align-items:center;gap:12px;margin-bottom:4px;font-family:var(--mono);font-size:11px}
.focobar a{color:var(--brand);text-decoration:none;border:1px solid var(--line2);border-radius:8px;padding:6px 11px}.focobar a:hover{background:rgba(120,243,255,.08)}
.focobar .focoid{color:var(--mut);letter-spacing:.05em}
.bigempty{border:1px dashed var(--line2);border-radius:14px;padding:44px 24px;text-align:center;color:var(--dim);font-family:var(--mono);font-size:12.5px;letter-spacing:.04em;line-height:1.7;grid-column:1/-1}
.bigempty b{color:var(--mut);display:block;font-size:13px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.bigempty a{color:var(--brand)}
.foot{margin-top:24px;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim)}.foot b{color:var(--brand)}

  /* Estilos históricos del componente de Misiones; Tareas no lo monta. */
  .decs{margin:0 0 18px;border:1px solid var(--warn,#ffb545);border-radius:12px;
    background:rgba(255,181,69,.05);padding:13px 15px}
  .decs-hd{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--warn,#ffb545);font-weight:700;display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .decs-n{color:var(--mut);letter-spacing:.05em}
  .decs-list{display:flex;flex-direction:column;gap:11px}
  .dec{border:1px solid var(--line2);border-radius:10px;background:var(--card);padding:12px 13px}
  .dec.urge{border-color:#ff6b6b;box-shadow:0 0 18px -6px #ff6b6b}
  .dec-top{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:8px}
  .dec-k{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--mut);border:1px solid var(--line);border-radius:6px;padding:3px 7px;white-space:nowrap}
  .dec-k.ag{color:var(--brand,#78f3ff);border-color:rgba(120,243,255,.35)}
  .dec-k.sur{color:#9effb0;border-color:rgba(61,240,138,.35)}
  .dec-clock{margin-left:auto;font-family:var(--mono);font-size:15px;font-weight:700;
    color:var(--warn,#ffb545);letter-spacing:.06em;font-variant-numeric:tabular-nums}
  .dec.urge .dec-clock{color:#ff6b6b;animation:decblink 1s infinite}
  @keyframes decblink{0%,100%{opacity:1}50%{opacity:.45}}
  .dec-q{font-size:13px;line-height:1.4;color:var(--ink);margin-bottom:10px}
  .dec-opts{display:flex;flex-direction:column;gap:6px}
  .dec-opt{display:flex;align-items:flex-start;gap:8px;text-align:left;width:100%;
    font-family:inherit;font-size:12px;line-height:1.35;color:var(--ink);cursor:pointer;
    background:transparent;border:1px solid var(--line);border-radius:8px;padding:8px 10px;transition:.15s}
  .dec-opt:hover{border-color:var(--brand,#78f3ff);background:rgba(120,243,255,.06)}
  .dec-opt:disabled{cursor:default;opacity:.72}
  .dec-opt:disabled:hover{border-color:var(--line);background:transparent}
  .dec-opt .n{font-family:var(--mono);font-size:10px;color:var(--mut);flex:none;padding-top:2px}
  .dec-opt.rec{border-color:var(--warn,#ffb545)}
  .dec-opt.rec .n{color:var(--warn,#ffb545)}
  .dec-opt.effective{opacity:1;border-color:var(--good,#3df08a);background:rgba(61,240,138,.09);
    box-shadow:inset 3px 0 0 var(--good,#3df08a)}
  .dec-opt.effective .n{color:var(--good,#3df08a);font-weight:800}
  .dec-opt.effective.expired{border-color:var(--warn,#ffb545);background:rgba(255,181,69,.08);
    box-shadow:inset 3px 0 0 var(--warn,#ffb545)}
  .dec-opt.effective.expired .n{color:var(--warn,#ffb545)}
  .dec-done{font-family:var(--mono);font-size:11px;padding:7px 0 0}
  .dec-done.ok{color:var(--good,#3df08a)}
  .dec-done.exp{color:var(--mut)}
  /* Retrato REAL del agente y foto/icono del equipo en la cabecera */
  .dec-k{display:inline-flex;align-items:center;gap:5px}
  .dec-av{width:18px;height:18px;border-radius:4px;object-fit:cover;object-position:center top;
    border:1px solid rgba(120,243,255,.35);display:block}
  .dec-k.maq img.machava{width:16px;height:16px;border-radius:3px;object-fit:cover;vertical-align:middle}
  /* BARRA DE PROGRESO de la opción que se ejecutará: el relleno avanza con el
     reloj — cuando llega al 100% es el momento en que el agente tira con ella. */
  .dec-opt.rec{position:relative;overflow:hidden;--fill:0%}
  .dec-opt.rec::before{content:"";position:absolute;inset:0 auto 0 0;width:var(--fill);
    background:linear-gradient(90deg,rgba(255,181,69,.05),rgba(255,181,69,.22));
    border-right:2px solid var(--warn,#ffb545);transition:width 1s linear;pointer-events:none;z-index:0}
  .dec-opt.rec > *{position:relative;z-index:1}
  .dec.urge .dec-opt.rec::before{background:linear-gradient(90deg,rgba(255,107,107,.08),rgba(255,107,107,.3));
    border-right-color:#ff6b6b}
  /* triangulito del titular: la explicación va plegada (más sitio para tareas) */
  .tgl{font-family:var(--mono);font-size:13px;line-height:1;color:var(--mut);background:transparent;
    border:1px solid var(--line);border-radius:6px;padding:3px 7px;cursor:pointer;vertical-align:middle;margin-left:6px}
  .tgl:hover{color:var(--brand);border-color:var(--brand)}

  /* ═══ MISIÓN que engloba los relojes (Carlos, 2026-07-21) ══════════════════
     Cada grupo de decisiones se encabeza con SU site: URL + captura viva
     (iframe escalado) para reconocer de un vistazo a qué misión pertenecen;
     las decisiones cuelgan DENTRO de la misión. Site deducido del texto. */
  .dec-mission{border:1px solid var(--line2);border-radius:12px;overflow:hidden;
    background:rgba(120,243,255,.03)}
  .dm-head{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid var(--line)}
  .dm-fav{width:22px;height:22px;border-radius:5px;flex:none;background:var(--card);object-fit:cover;font-size:14px}
  .dm-url{font-family:var(--mono);font-size:13.5px;font-weight:700;color:var(--brand);text-decoration:none;
    letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dm-url:hover{text-decoration:underline}
  .dm-count{margin-left:auto;flex:none;font-family:var(--mono);font-size:10px;letter-spacing:.05em;
    text-transform:uppercase;color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:3px 9px;white-space:nowrap}
  .dm-shot{position:relative;width:100%;height:190px;overflow:hidden;background:var(--bg);border-bottom:1px solid var(--line)}
  .dm-shot .dm-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);
    background:radial-gradient(120% 90% at 50% 0,rgba(120,243,255,.06),transparent)}
  .dm-shot iframe{position:absolute;top:0;left:0;width:1400px;height:1000px;border:0;
    transform-origin:top left;pointer-events:none;background:transparent}
  .dec-mission-body{display:flex;flex-direction:column;gap:11px;padding:12px 13px}
  .dec-mission.nosite .dm-head{border-bottom:0}
</style>
</head>
<body data-yk-title="TAREAS" data-yk-zone="app">
<div class="wrap">
  <!-- CABEZAL COMPARTIDO con /misiones (Carlos, 2026-07-21): contadores por
       estado + día del tablero · título + buscador · alta de misión de flota.
       Lo inyecta y cablea yk-cabezal.js. REGLA DE LOS TERCIOS (FLT-979): cada
       misión se descompone en 3 tareas a·b·c con 3 subtareas cada una
       (a1…c3, máx 9) — la JORNADA COMPLETA de un agente: las define el agente
       principal y las ejecuta el subagente. Los planes ANTIGUOS con pasos d…h
       (modelo de 8) no se tocan: sus filas se cuentan aparte como «+n». -->
  <div id="cabezal"></div>

  <!-- Presets de FECHA de creación (el día concreto se elige en el selector del
       cabezal). Por defecto sólo las de HOY. -->
  <div class="tfilter" id="tfilter">
    <button class="tf on" data-r="hoy">Hoy</button>
    <button class="tf" data-r="ayer">Ayer</button>
    <button class="tf" data-r="7d">Últimos 7 días</button>
    <button class="tf" data-r="todas">Todas</button>
  </div>

  <div class="grid" id="grid"><div class="bigempty"><b>Cargando tareas…</b>Reuniendo los planes de todas las misiones.</div></div>
  <div class="foot">Yokup · tareas de todas las misiones · plan <b>a·b·c × 1·2·3</b> · persistencia <b>D1</b></div>

  <!-- EXPERTO (raíl inferior) -->
  <div class="yk-expert-btns" data-yk-slot="bottom">
    <button data-yk-fetch="/tickets">misiones JSON</button>
  </div>
  <pre class="yk-expert-out" data-yk-slot="bottom">Pulsa «misiones JSON» para volcar los datos crudos del worker.</pre>
</div>

<script src="/yk-misiones.js?v=r47"></script>
<script src="/yk-adjuntos.js?v=r3"></script>
<script src="/yk-cabezal.js?v=r2"></script>
<script>
const WORKER="https://yokup-rtc.csilvasantin.workers.dev";
const $=id=>document.getElementById(id);
const esc=YkMisiones.esc;
// Fichas PLEGADAS por defecto (ocupan menos); recuerda en localStorage cuáles abrió
// Carlos para no re-plegárselas. «Sino decido yo lo contrario» = por defecto plegadas. (954)
const OPEN_CARDS=new Set((()=>{try{return JSON.parse(localStorage.getItem("yk_tareas_open")||"[]")}catch(e){return[]}})());
function saveOpenCards(){try{localStorage.setItem("yk_tareas_open",JSON.stringify([...OPEN_CARDS]))}catch(e){}}
YkMisiones.init({worker:WORKER});
// FOCO desde la URL (964): /tareas?mission=FLT-XXX muestra SOLO esa misión (con su
// ficha ABIERTA aunque el resto vaya plegado), y #a / #b2 hace scroll y la RESALTA.
// Enlace compartible que abre justo donde toca, en las dos vistas.
const FOCUS=(new URLSearchParams(location.search).get("mission")||"").trim();
if(FOCUS) OPEN_CARDS.add(FOCUS);
let GROUPS=[];  // [{mission:{...ticket}, tasks:[...]}]
let STATE=null; // filtro por estado (KPI): sin | asignadas | in_progress | resolved | null
let SEARCH=""; // texto del buscador del cabezal

// ── CABEZAL COMPARTIDO (mismo que /misiones): KPIs + buscador + alta ──────────
// Los KPIs cuentan las misiones (por estado) de la fecha elegida y filtran el
// tablero de tareas; el buscador filtra por título/id/pantalla; el selector de
// día del cabezal fija el «día concreto». El alta crea misiones de flota y, al
// crear, recarga las tareas para ver enseguida su plan.
const CAB=YkCabezal.mount($("cabezal"), {
  worker:WORKER,
  title:"Tareas",
  searchPlaceholder:"🔎 Buscar tarea…",
  intro:'Los pasos en que se descompone cada misión — <b>regla de los tercios</b>: <b>3 tareas</b> a·b·c con <b>3 subtareas</b> cada una (a1…c3, máx 9) — una misión = jornada completa de un agente. El denominador es SIEMPRE 3 y 9 para poder comparar dos misiones de un vistazo: un plan a medio definir se marca «◌ incompleto» (borde discontinuo), nunca se le baja el denominador. Los planes antiguos con pasos d…h se cuentan aparte como «+n». Chips clicables ○◐● para avanzar estado; ⚙️ ejecutan los subagentes, 📝 reportan los infraagentes. Agrupado por misión, lo más reciente primero.',
  defaultView:"cards",   // /tareas nace en FICHAS; el conmutador la pasa a lista (962)
  onView:()=>render(),
  onState:f=>{ STATE=f; render(); },
  onSearch:q=>{ SEARCH=q; render(); },
  onDay:ymd=>{ if(!ymd) return; DFILTER={mode:"dia", day:ymd};
    $("tfilter").querySelectorAll(".tf").forEach(x=>x.classList.remove("on"));
    $("grid").innerHTML='<div class="bigempty"><b>Cargando…</b>Filtrando por fecha.</div>'; load(); },
  onCreated:()=>load()
});
// El día concreto por defecto = HOY (coincide con el preset «Hoy» activo).
(function(){ const d=new Date(),p=n=>(n<10?"0":"")+n; CAB.setDay(d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())); })();

// ── FILTRO POR FECHA (de creación de la misión) ──────────────────────────────
// Por defecto sólo salen las creadas HOY (Carlos, 2026-07-15). Los presets y el
// selector de día cambian el rango y recargan. created_at tolerante a s/ms.
let DFILTER={mode:"hoy", day:""};
const _ms=v=>{v=+v||0;return v>4102444800?v:v*1000;};
const _pad=n=>(n<10?"0":"")+n;
const _ymd=d=>d.getFullYear()+"-"+_pad(d.getMonth()+1)+"-"+_pad(d.getDate());
function dayBounds(ymd){ const[y,m,d]=ymd.split("-").map(Number); const s=new Date(y,m-1,d,0,0,0,0).getTime(); return [s,s+86400000]; }
function inRange(created){
  const c=_ms(created); if(!c) return false;
  if(DFILTER.mode==="todas") return true;
  if(DFILTER.mode==="7d") return c>=Date.now()-7*86400000;
  let ymd;
  if(DFILTER.mode==="dia") ymd=DFILTER.day;
  else if(DFILTER.mode==="ayer"){ const d=new Date(); d.setDate(d.getDate()-1); ymd=_ymd(d); }
  else ymd=_ymd(new Date()); // hoy
  if(!ymd) return true;
  const [s,e]=dayBounds(ymd); return c>=s && c<e;
}
function filterLabel(){
  return DFILTER.mode==="hoy"?"creadas hoy":DFILTER.mode==="ayer"?"creadas ayer":
    DFILTER.mode==="7d"?"de los últimos 7 días":DFILTER.mode==="dia"?("del "+DFILTER.day):null;
}

async function load(){
  // scope=todas: el árbol de tareas es el mismo modelo para las misiones de la
  // flota (encargos a los agentes) y las de campo (incidencias de pantallas).
  // UNA sola petición al endpoint agregado /tasks/all (antes: /tickets + un
  // fetch por misión = N+1, cada 15 s; ahora una query D1 con JOIN).
  let rows; try{ rows=await YkMisiones.fetchAllTasks("todas"); }catch(e){ return; }
  // Agrupa por misión y filtra por fecha de creación (sólo las del rango).
  // Con foco (?mission=), esa misión se muestra IGNORANDO el filtro de fecha (para
  // que el enlace abra aunque sea de otro día); sin foco, sólo las del rango. (964)
  const groups=YkMisiones.groupByMission(rows).filter(g=>FOCUS?g.mission.id===FOCUS:inRange(g.mission.created_at));
  groups.sort((a,b)=>Math.max(...b.tasks.map(x=>x.updated_at||0))-Math.max(...a.tasks.map(x=>x.updated_at||0)));
  GROUPS=groups;
  // KPIs del cabezal: aquí contamos TAREAS (los pasos a/b/c en que se desglosa
  // cada misión), NO misiones — si contáramos misiones saldría el mismo número
  // que en /misiones, y son cosas distintas (una misión ≈ 3 tareas). Cada tarea
  // tiene su propio estado; su bucket se deriva igual que el de una misión
  // (done→Finalizada, in_progress→En curso, pending con dueño→Pendiente, sin
  // dueño→Sin asignar). Se cuentan TODAS las tareas del rango de fecha.
  const allTasks=groups.flatMap(g=>g.tasks);
  CAB.setCounts({
    sin: allTasks.filter(t=>taskEstado(t)==="Sin asignar").length,
    asig: allTasks.filter(t=>taskEstado(t)==="Pendiente").length,
    prog: allTasks.filter(t=>taskEstado(t)==="En curso").length,
    res: allTasks.filter(t=>taskEstado(t)==="Finalizada").length
  });
  render();
}
// Estado canónico de UNA tarea (paso a/b/c), espejo de YkMisiones.estadoDe pero
// sobre el estado propio de la tarea y su dueño (owner ↔ assignee de la misión).
function taskEstado(t){
  if(t.status==="done"||t.status==="resolved") return "Finalizada";
  if(t.status==="in_progress") return "En curso";
  return t.owner ? "Pendiente" : "Sin asignar";
}
// Filtra los grupos por el KPI de estado activo y por el buscador del cabezal.
const STATE_LBL={sin:"Sin asignar",asignadas:"Pendiente",in_progress:"En curso",resolved:"Finalizada"};
function visibles(){
  let gs=GROUPS;
  // El KPI filtra por estado de TAREA: se muestran las misiones que tienen al
  // menos una tarea en ese estado (el árbol a/b/c completo, para no perder contexto).
  if(STATE&&STATE_LBL[STATE]) gs=gs.filter(g=>g.tasks.some(t=>taskEstado(t)===STATE_LBL[STATE]));
  if(SEARCH){
    const nrm=s=>String(s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
    const nq=nrm(SEARCH);
    gs=gs.filter(g=>[g.mission.subject,g.mission.id,g.mission.screen,g.mission.loc,g.mission.assignee].some(v=>nrm(v).includes(nq)));
  }
  return gs;
}
function render(){
  const box=$("grid");
  if(!GROUPS.length){
    const lbl=filterLabel();
    box.innerHTML=lbl
      ? '<div class="bigempty"><b>Sin tareas '+esc(lbl)+'</b>No hay misiones con plan en esa fecha. Prueba otro día o pulsa <b style="display:inline">Todas</b>.</div>'
      : '<div class="bigempty"><b>Ninguna misión tiene plan todavía</b>Entra en <a href="/misiones">Misiones</a>, selecciona una y pulsa «🧠 Proponer plan (IA)» — su árbol a/b/c aparecerá aquí.</div>';
    return;
  }
  const gs=visibles();
  if(!gs.length){
    box.innerHTML='<div class="bigempty"><b>Sin resultados en este filtro</b>'+
      (SEARCH?'No hay misiones que casen con «'+esc(SEARCH)+'».':'No hay misiones en ese estado para la fecha elegida.')+
      ' Ajusta el buscador o los contadores de arriba.</div>';
    return;
  }
  // Breadcrumb de vuelta cuando hay foco (964): que no se quede uno atrapado.
  const _bc = FOCUS ? '<div class="focobar"><a href="/tareas">← ver todas las misiones</a><span class="focoid">🎯 '+esc(FOCUS)+'</span></div>' : "";
  box.innerHTML=_bc+gs.map(g=>{const _op=OPEN_CARDS.has(g.mission.id)||g.mission.id===FOCUS;return `<div class="mcard ${_op?'':'collapsed'}" data-id="${esc(g.mission.id)}">
    <div class="mhd"><button class="mtog" title="plegar / desplegar" aria-expanded="${_op}">${_op?'▾':'▸'}</button><a class="mid" href="/ticket?id=${encodeURIComponent(g.mission.id)}" title="Abrir la misión">🎯 ${esc(g.mission.id)}</a>${(()=>{const p=YkMisiones.tercios(g.tasks);
      // REGLA DE LOS TERCIOS (FLT-979 c): esta cabecera decía «regla de los
      // tercios» en el tooltip pero pintaba subtareas_hechas/subCount(), o sea
      // denominadores libres (1/22, 1/13, 1/10, 1/7…) — justo lo que la misión
      // venía a matar. Ahora usa el MISMO chip que /misiones: n/3 · n/9 (+n).
      return p?YkMisiones.progHtml(p):'<span class="tcount" title="esta misión aún no tiene plan">0/3</span>';})()}</div>
    <div class="msub">${esc(g.mission.subject)}</div>
    <div class="mmeta"><span class="scr">${esc(g.mission.screen||"")}</span>${g.mission.loc?" · "+esc(g.mission.loc):""}</div>
    <div class="tree">${YkMisiones.stepsHtml(g.tasks)}</div>
  </div>`;}).join("");
  // chips clicables: avanzan estado contra el worker y repintan
  box.querySelectorAll(".mcard").forEach(card=>{
    const mid=card.dataset.id;
    // Plegar/desplegar: clic en la cabecera (menos el enlace al ticket) alterna, y
    // recuerda la elección. La cabecera (id + progreso + estado) siempre visible.
    const hd=card.querySelector(".mhd");
    if(hd) hd.addEventListener("click",e=>{
      if(e.target.closest("a")) return;
      card.classList.toggle("collapsed");
      const open=!card.classList.contains("collapsed");
      if(open) OPEN_CARDS.add(mid); else OPEN_CARDS.delete(mid);
      saveOpenCards();
      const b=card.querySelector(".mtog"); if(b){b.textContent=open?"▾":"▸";b.setAttribute("aria-expanded",String(open));}
    });
    card.querySelectorAll(".chip").forEach(ch=>{
      ch.onclick=()=>{
        const cur=["pending","in_progress","done"].find(s=>ch.classList.contains(s))||"pending";
        YkMisiones.postStatus(mid, ch.dataset.code, YkMisiones.nextStatus(cur)).then(load);
      };
    });
  });
  // Scroll + RESALTADO al paso del hash (#a, #b2): el enlace abre justo donde toca. (964)
  if(location.hash){
    const code=location.hash.slice(1).replace(/[^a-z0-9]/gi,"");
    const node=code&&box.querySelector('.node[data-code="'+code+'"]');
    if(node){ const st=node.closest(".step"); if(st) st.classList.remove("collapsed");
      box.querySelectorAll(".foco-step").forEach(n=>n.classList.remove("foco-step"));
      node.classList.add("foco-step");
      setTimeout(()=>{ try{node.scrollIntoView({behavior:"smooth",block:"center"});}catch(e){} },90);
    }
  }
}
// Cableado de los presets de fecha. Cambiar recarga y refleja el día concreto
// en el selector del cabezal (para que ambos digan lo mismo).
const _pd=n=>(n<10?"0":"")+n, _dstr=d=>d.getFullYear()+"-"+_pd(d.getMonth()+1)+"-"+_pd(d.getDate());
$("tfilter").querySelectorAll(".tf").forEach(b=>b.onclick=()=>{
  DFILTER={mode:b.dataset.r, day:""};
  $("tfilter").querySelectorAll(".tf").forEach(x=>x.classList.toggle("on",x===b));
  // El selector de día del cabezal acompaña al preset: hoy/ayer muestran su
  // fecha; 7d/todas lo dejan en blanco (no expresan un día concreto).
  if(b.dataset.r==="hoy") CAB.setDay(_dstr(new Date()));
  else if(b.dataset.r==="ayer"){ const d=new Date(); d.setDate(d.getDate()-1); CAB.setDay(_dstr(d)); }
  else CAB.setDay("");
  $("grid").innerHTML='<div class="bigempty"><b>Cargando…</b>Filtrando por fecha.</div>';
  load();
});

load(); setInterval(load,15000);
</script>
