<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yokup</title>
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="0; url=/tool/">
<link rel="canonical" href="https://www.yokup.com/tool/">
<link rel="icon" type="image/svg+xml" href="/tool/favicon.svg">
<style>
  :root { color-scheme: dark; }
  html,body{ height:100%; margin:0; }
  body{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; gap:18px;
    background:#0b0d10; color:#e7e9ee;
    font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; text-align:center;
  }
  img{ width:56px; height:56px; }
  a{ color:#7cc4ff; }
  .muted{ color:#8b93a1; font-size:14px; }
</style>
<script>
  // Redirección inmediata a /tool/ (el meta refresh es el respaldo).
  location.replace('/tool/');
</script>
</head>
<body>
  <img src="/tool/logo-mark.svg" alt="Yokup" onerror="this.style.display='none'">
  <p>Redirigiendo a <a href="/tool/">yokup.com/tool</a>…</p>
  <p class="muted">Si no ocurre nada, pulsa el enlace.</p>
</body>
</html>
