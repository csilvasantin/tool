# yokup-rtc — Worker del helpdesk Yokup (API tickets + realtime WebRTC + IA).
# Fuente RECUPERADA de producción (Cloudflare) el 2026-07-13 y ampliada con el
# modelo MISIONES·TAREAS (mission_tasks + endpoints /mission/*). Espejo del prod,
# igual que se hizo con yokup-site. Deploy: `cd yokup-rtc && npx wrangler deploy`.
#
# Los secretos (TURN_TOKEN, VAPID_PRIVATE, YK_SESSION_SECRET) NO viven aquí: ya
# están puestos en el Worker (wrangler secret) y wrangler los preserva al desplegar.
#
# ── DESPLEGAR DESDE EL REPO ES SEGURO (FLT-982 a, 22-jul-2026) ───────────────
# Corrió el aviso de que producción tenía código que no estaba en el repo (el
# guard del reloj, las tablas mission_batches/mission_batch_items del carrusel).
# COMPROBADO y FALSO: el repo ya estaba reconciliado. Método, por si hay que
# repetirlo — NO uses `wrangler init --from-dash`, devuelve un scaffold de 26
# líneas y engaña:
#   1) token OAuth de wrangler en ~/Library/Preferences/.wrangler/config/default.toml
#   2) GET https://api.cloudflare.com/client/v4/accounts/<ACCOUNT_ID>/workers/
#      services/yokup-rtc/environments/production/content   (multipart, ~850 KB;
#      el endpoint /workers/scripts/<name>/content responde 405)
#   3) `npx wrangler deploy --dry-run --outdir=…` para bundlear el repo igual
#   4) diff de la región `// src/index.js` → fin del código de ambos bundles
# Resultado: IDÉNTICOS salvo la profundidad de las rutas relativas de unenv.
# Antes de desplegar, repite el paso 4: si sale limpio, adelante.
#
# Reverificado (FLT-982 c, 22-jul-2026): prod == repo BYTE A BYTE (la única
# diferencia es un salto de línea final). OJO con el alcance del método: solo
# compara contra la versión VIVA. El contenido de versiones ANTIGUAS no se puede
# bajar —`/versions/<id>/content` devuelve metadatos y `content/v2?version=<id>`
# ignora el parámetro y sirve la actual—, así que un despliegue que pisara algo
# ya no es reconstruible a posteriori: hay que comparar ANTES de desplegar.
name = "yokup-rtc"
main = "src/index.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]  # @cloudflare/puppeteer usa node:buffer (Browser Rendering)

[observability]
enabled = true

# Reconcilia flota→tickets cada 2 min aunque nadie mire la bandeja.
[triggers]
crons = ["*/2 * * * *"]

# D1 (SQLite) — tickets, events, subs, mission_tasks.
[[d1_databases]]
binding = "DB"
database_name = "yokup-tickets"
database_id = "fc2d2810-0fb9-46bb-b05c-14c41fbd1b65"

# Workers AI — triaje, KB, copiloto y proposición de plan (misiones·tareas).
[ai]
binding = "AI"

# Browser Rendering — captura PROPIA de webs para /shot (sin la marca de agua de
# thum.io). Requiere Workers Paid (ya en uso por D1/R2/Vectorize). Carlos 2026-07-17.
[browser]
binding = "BROWSER"

# Bot-inbox de la flota (encargos de Carlos a los agentes) → misiones source='fleet'.
# Va por SERVICE BINDING y no por https://admira-telegram.csilvasantin.workers.dev:
# los dos Workers comparten subdominio workers.dev, así que un fetch normal hace
# loopback contra el propio yokup-rtc y devolvía 404.
[[services]]
binding = "TELEGRAM"
service = "admira-telegram"

# ⚡ Nudge inmediato al CLI del agente: /fleet/nudge → admira-navegadores /api/cmd
# (mismo subdominio workers.dev → binding para no hacer loopback). El Bearer va en
# el secreto NAV_CMD_TOKEN (= NAV_EXECUTOR_TOKEN de la bóveda).
[[services]]
binding = "NAVEGADORES"
service = "admira-navegadores"

# Vectorize — base de conocimiento semántica de incidencias resueltas.
[[vectorize]]
binding = "VECTORIZE"
index_name = "yokup-kb"

# R2 — imágenes adjuntas a las misiones (paste/drop desde el navegador o Telegram).
# El LLM recibe la URL pública (GET /media/:key) en el texto del encargo y la ve.
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "yokup-media"

# Durable Object — sala de señalización WebRTC (asistencia en vivo).
[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

# Variables en claro (los secretos van aparte, vía `wrangler secret put`).
[vars]
TURN_KEY_ID = "e20e7a6b4f6f24a19d40eb81ce6a26e7"
VAPID_PUBLIC = "BDqJIroeM7TZyFufMupmO6v9q-b4ahgGZ3JJL-E_5Kj1d4pBsHSVlsr-ju2J1vpr9zoMVwXWZUMudqXJ9KRVri4"

# Registro de flota (fichas de equipo + miembros de silicio). Service binding y
# no fetch normal: dos workers *.csilvasantin.workers.dev que se llaman por URL
# hacen LOOPBACK contra sí mismos en vez de salir al otro.
[[services]]
binding = "FLEET_SVC"
service = "admira-fleet"
